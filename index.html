    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { green: '#16a34a' } },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'fade-up': 'fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'border-move': 'borderGradientMove 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(32px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        },
                        borderGradientMove: {
                            '0%, 100%': { 'background-position': '0% 50%' },

                        }

    <style type="text/tailwindcss">
        @layer components {
            .avatar-container { @apply relative w-48 h-48 mb-8 flex items-center justify-center; }
            
            .avatar-ring {
                @apply absolute inset-0 rounded-full p-1.5 bg-gradient-to-r from-brand-green via-black to-brand-green 
                       bg-[length:400%_400%] animate-border-move shadow-xl z-0;
            }

            .avatar-img {
                @apply w-full h-full object-cover rounded-full border-4 border-white bg-white shadow-xl z-10;
                backface-visibility: hidden;
                will-change: transform, opacity;
                animation: profilePeekOnce 5s cubic-bezier(0.4, 0, 0.2, 1) 1 forwards;
            }

            .avatar-greeting {
                @apply absolute inset-0 flex items-center justify-center rounded-full bg-brand-green text-white text-5xl font-bold opacity-0 scale-50 z-20 pointer-events-none;
                backface-visibility: hidden;
                will-change: transform, opacity;
                animation: greetingPeekOnce 5s cubic-bezier(0.4, 0, 0.2, 1) 1 forwards;
            }

            .btn-premium {
                @apply flex items-center justify-center gap-3 w-full py-4 px-6 rounded-2xl font-semibold 
                       transition-all duration-300 transform hover:-translate-y-1 active:scale-95;
            }
        }

        @keyframes profilePeekOnce {
            0%, 15% { opacity: 1; transform: scale(1); }
            25%, 75% { opacity: 0; transform: scale(0.8); }
            85%, 100% { opacity: 1; transform: scale(1); }
        }

        @keyframes greetingPeekOnce {
            0%, 20% { opacity: 0; transform: scale(0.5); }
            35%, 65% { opacity: 1; transform: scale(1.1); }
            80%, 100% { opacity: 0; transform: scale(0.5); }
        }

        body { background: linear-gradient(180deg, #fdfdfd 0%, #f4f7f9 100%); }
    </style>

    <script>
        async function handleShare() {
            try {
                if (navigator.share) {
                    await navigator.share({ 
                        title: 'Felipe Maia | Lipe Code', 
                        text: 'Confira o trabalho de Felipe Maia, desenvolvedor focado em experiência do usuário.',
                        url: window.location.href 
                    });
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    alert('Link copiado para a área de transferência!');
                }
            } catch (e) { console.warn('Share falhou'); }
        }
